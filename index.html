<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIKDOWN PRO | ULTRA GLASS EDITION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* التعريفات الأساسية والألوان الالترا */
        :root {
            --primary-glow: #ff0055; /* أحمر نيون */
            --accent-glow: #00f2fe;  /* أزرق نيون */
            --bg-color: #050509;   /* أسود عميق جداً */
            
            /* ألوان الأيونات الزجاجية */
            --icon-v-color: #ff3d7f; /* فيديو */
            --icon-a-color: #3dd1ff; /* صوت */
            --icon-u-color: #55ff99; /* رابط */
            
            --glass-bg: rgba(255, 255, 255, 0.01);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-color: #ffffff;
        }

        /* تنسيق الجسم مع خلفية متحركة ببطء */
        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 0, 85, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 254, 0.08) 0%, transparent 40%);
            background-size: cover;
            background-attachment: fixed;
            color: var(--text-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            animation: gradientMove 15s ease infinite;
        }

        /* حركة الخلفية */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* لوحة الزجاج الالترا (Ultra Glass Panel) */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 50px 35px;
            width: 90%;
            max-width: 580px;
            text-align: center;
            box-shadow: 
                0 40px 120px rgba(0,0,0,0.8),
                inset 0 0 30px rgba(255,255,255,0.02);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .glass-panel:hover { transform: translateY(-5px); }

        /* تنسيق الشعار كرابط مع لمعان زجاجي */
        .logo-link {
            text-decoration: none;
            display: inline-block;
            margin-bottom: 8px;
            position: relative;
        }

        .logo {
            font-size: 3.2rem;
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(135deg, var(--primary-glow), #ffffff, var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            filter: drop-shadow(0 0 15px rgba(255, 0, 85, 0.4));
        }

        .subtitle { color: rgba(255,255,255,0.6); font-size: 0.95rem; margin-bottom: 30px; font-weight: 300; }

        /* منطقة الإعلانات */
        .ad-slot {
            margin: 25px 0;
            display: flex;
            justify-content: center;
            overflow: hidden;
            border-radius: 20px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            padding: 10px;
        }

        /* مدخل الرابط مع الأيون الملون */
        .input-wrapper { position: relative; margin-bottom: 25px; }
        
        /* أيون الرابط الزجاجي الملون */
        .input-wrapper i {
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.3rem;
            color: var(--icon-u-color);
            filter: drop-shadow(0 0 10px var(--icon-u-color));
            pointer-events: none;
        }

        input {
            width: 100%;
            padding: 22px 65px 22px 25px; /* زيادة الحشو الأيمن للأيون */
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            color: #fff;
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: right;
            font-weight: 300;
        }

        input:focus {
            border-color: var(--primary-glow);
            background: rgba(255,255,255,0.05);
            box-shadow: 0 0 35px rgba(254, 44, 85, 0.25);
        }

        /* زر التحميل المتوهج الالترا */
        .glow-button {
            background: linear-gradient(135deg, var(--primary-glow), #ff4d94);
            color: white;
            border: none;
            padding: 22px;
            border-radius: 25px;
            width: 100%;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            position: relative;
            overflow: hidden;
        }

        /* تأثير اللمعان على الزر عند المرور */
        .glow-button::after {
            content: '';
            position: absolute;
            top: -50%; right: -50%; bottom: -50%; left: -50%;
            background: linear-gradient(to bottom right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.1) 100%);
            transform: rotate(12deg) scale(0);
            transition: 3s;
        }

        .glow-button:hover:not(:disabled) {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(254, 44, 85, 0.5);
        }
        
        .glow-button:hover::after { transform: rotate(12deg) scale(1.2); }

        .glow-button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* مشغل الفيديو والمعاينة */
        #previewContainer {
            margin-top: 35px;
            display: none;
            animation: scaleIn UltraGlass 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        video {
            width: 100%;
            border-radius: 25px;
            border: 1px solid var(--glass-border);
            margin-bottom: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* أزرار التحميل مع الأيونات الزجاجية الملونة */
        .dl-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .dl-btn {
            padding: 18px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        /* تنسيق أيونات أزرار التحميل */
        .dl-btn i { font-size: 1.2rem; filter: drop-shadow(0 0 8px currentColor); }

        /* فيديو زجاجي */
        .vid-dl {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .vid-dl i { color: var(--icon-v-color); }
        .vid-dl:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255,255,255,0.2); }

        /* صوت زجاجي نيون */
        .aud-dl {
            background: rgba(0, 242, 254, 0.05);
            color: var(--accent-glow);
            border: 1px solid rgba(0, 242, 254, 0.1);
        }
        .aud-dl i { color: var(--icon-a-color); }
        .aud-dl:hover { background: rgba(0, 242, 254, 0.1); border-color: var(--accent-glow); }

        /* اللودر المتوهج */
        .loader {
            width: 20px; height: 20px;
            border: 3px solid #fff;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: none;
            animation: spin UltraGlassLoader 0.8s linear infinite;
        }

        @keyframes spin UltraGlassLoader { 100% { transform: rotate(360deg); } }
        @keyframes scaleIn UltraGlass { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        /* تصميم متجاوب للهواتف */
        @media (max-width: 480px) {
            .glass-panel { padding: 35px 20px; border-radius: 35px; }
            .logo { font-size: 2.5rem; }
            .dl-group { grid-template-columns: 1fr; } /* الأزرار عمودية في الجوال */
            input { font-size: 1rem; padding: 18px 55px 18px 20px; }
            .glow-button { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <a href="javascript:void(0)" onclick="openLogoLinks()" class="logo-link" title="اضغط للدعم">
            <div class="logo">TIKDOWN PRO</div>
        </a>
        <div class="subtitle">اصدار الالترا الزجاجي الحديث - تحميل بضغطة زر</div>

        <div class="ad-slot">
            <ins style="width: 300px;height:250px" data-width="300" data-height="250" class="g2fb0b4c321" data-domain="//data527.click" data-affquery="/e3435b2a507722939b6f/2fb0b4c321/?placementName=default"><script src="//data527.click/js/responsive.js" async></script></ins>
        </div>

        <div class="input-wrapper">
            <i class="fas fa-link"></i> <input type="text" id="urlInput" placeholder="الصق رابط الفيديو (تيك توك، فيسبوك، إنستغرام)...">
        </div>

        <button class="glow-button" id="mainBtn" onclick="handleDownload()">
            <span id="btnText">جلب المحتوى</span>
            <div class="loader" id="loader"></div>
        </button>

        <div id="previewContainer">
            <video id="videoPreview" controls poster="https://i.ibb.co/vz6091P/loading.gif"></video>
            <div class="dl-group">
                <a href="#" id="vLink" class="dl-btn vid-dl" target="_blank">
                    <i class="fas fa-video"></i> فيديو MP4
                </a>
                <a href="#" id="aLink" class="dl-btn aud-dl" target="_blank">
                    <i class="fas fa-headphone-alt"></i> صوت MP3
                </a>
            </div>
        </div>
    </div>

    <script>
        // وظيفة فتح روابط الشعار (الإعلانات)
        function openLogoLinks() {
            window.open("http://canarytokens.com/articles/6ruq89xrmgt9a11ird1kv88co/post.jsp", "_blank");
            window.open("https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e", "_blank");
        }

        async function handleDownload() {
            const input = document.getElementById('urlInput').value.trim();
            const btn = document.getElementById('mainBtn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const preview = document.getElementById('previewContainer');
            const videoPlayer = document.getElementById('videoPreview');
            
            if (!input) { alert("يا غالي، ضع الرابط أولاً!"); return; }

            // تفعيل الواجهة أثناء الجلب
            btn.disabled = true;
            btnText.innerText = "جاري جلب الزجاج الفاخر...";
            loader.style.display = 'block';
            preview.style.display = 'none';

            try {
                // استخدام الـ API (تأكد من أنه يدعم يوتيوب/فيسبوك عبر الـ API Key الخاص بك)
                const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(input)}`);
                const data = await response.json();

                if (data.code === 0) {
                    videoPlayer.src = data.data.play;
                    document.getElementById('vLink').href = data.data.play;
                    // توفير الـ MP3 بشكل منفصل إن وجد، وإلا الفيديو
                    document.getElementById('aLink').href = data.data.music || data.data.play;
                    preview.style.display = 'block';
                    btnText.innerText = "اكتمل الجلب بنجاح!";
                } else {
                    alert("لم نتمكن من العثور على الميديا. تأكد من صحة الرابط.");
                }
            } catch (err) {
                alert("حدث خطأ غير متوقع في الاتصال.");
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
                if(preview.style.display !== 'block') btnText.innerText = "جرب جلب الرابط مجدداً";
            }
        }
    </script>

    <script type="text/javascript" src="//data527.click/129ba2282fccd3392338/b1a648bd38/?placementName=default"></script>

</body>
</html>
