<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIKDOWN PRO | CINEMATIC EDITION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #fe2c55;
            --secondary: #25f4ee;
            --bg-dark: #020205;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.1);
        }

        /* خلفية سينمائية مع أنيميشن */
        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 5% 5%, rgba(254, 44, 85, 0.15) 0%, transparent 30%),
                radial-gradient(circle at 95% 95%, rgba(37, 244, 238, 0.15) 0%, transparent 30%);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* كارت الزجاج العائم */
        .ultra-card {
            background: var(--glass);
            backdrop-filter: blur(50px) saturate(200%);
            -webkit-backdrop-filter: blur(50px) saturate(200%);
            border: 1px solid var(--border);
            border-radius: 60px;
            padding: 60px 40px;
            width: 100%;
            max-width: 680px;
            text-align: center;
            box-shadow: 0 60px 150px rgba(0,0,0,0.9);
            position: relative;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .logo-area { cursor: pointer; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .logo-area:hover { transform: scale(1.08) rotate(-2deg); }
        
        .logo {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--primary), #fff, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(254, 44, 85, 0.3);
            letter-spacing: -3px;
        }

        .subtitle { color: rgba(255,255,255,0.5); font-size: 1rem; margin-bottom: 40px; }

        /* التبويبات العلوية */
        .tabs-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .tab {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 15px 5px;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.4s;
            font-size: 0.85rem;
            color: #777;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .tab i { font-size: 1.5rem; }
        .tab.active {
            background: rgba(255,255,255,0.07);
            border-color: #fff;
            color: #fff;
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
            transform: scale(1.05);
        }

        /* ألوان النيون لكل منصة */
        .tab[data-type="tiktok"].active { color: #ff0050; border-color: #ff0050; }
        .tab[data-type="fb"].active { color: #1877f2; border-color: #1877f2; }
        .tab[data-type="ig"].active { color: #e1306c; border-color: #e1306c; }
        .tab[data-type="yt"].active { color: #ff0000; border-color: #ff0000; }

        /* منطقة الإدخال */
        .platform-input { display: none; animation: slideUp 0.6s ease; }
        .platform-input.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .input-group { position: relative; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 25px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 30px;
            color: #fff;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            transition: 0.4s;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--secondary); background: rgba(255,255,255,0.05); }

        /* زر الأكشن الكبير */
        .action-btn {
            background: linear-gradient(90deg, var(--primary), #ff4b2b);
            color: #fff;
            border: none;
            padding: 25px;
            width: 100%;
            border-radius: 30px;
            font-size: 1.4rem;
            font-weight: 900;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 20px 50px rgba(254, 44, 85, 0.4);
        }
        .action-btn:hover { transform: scale(1.02); box-shadow: 0 30px 60px rgba(254, 44, 85, 0.6); }

        /* النتيجة والمعاينة */
        #resultView { margin-top: 45px; display: none; animation: scaleIn 0.5s ease-out; }
        video { width: 100%; border-radius: 35px; border: 1px solid var(--border); box-shadow: 0 30px 60px rgba(0,0,0,0.5); }

        .dl-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        .dl-item {
            padding: 20px; border-radius: 20px; text-decoration: none; font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s;
        }
        .v-btn { background: #fff; color: #000; }
        .a-btn { background: var(--secondary); color: #000; }

        .loader { width: 25px; height: 25px; border: 4px solid #fff; border-bottom-color: transparent; border-radius: 50%; display: none; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* إعلان */
        .ad-box { margin-bottom: 30px; background: rgba(255,255,255,0.02); border-radius: 25px; padding: 10px; }
    </style>
</head>
<body>

    <div class="ultra-card">
        <div class="logo-area" onclick="openLinks()">
            <div class="logo">TIKDOWN PRO</div>
        </div>
        <div class="subtitle">التجربة السينمائية لتحميل الميديا بجميع الصيغ</div>

        <div class="ad-box">
            <ins style="width: 300px;height:250px" data-width="300" data-height="250" class="g2fb0b4c321" data-domain="//data527.click" data-affquery="/e3435b2a507722939b6f/2fb0b4c321/?placementName=default"><script src="//data527.click/js/responsive.js" async></script></ins>
        </div>

        <div class="tabs-container">
            <div class="tab active" data-type="tiktok" onclick="switchBox('tiktok')"><i class="fab fa-tiktok"></i><span>Tiktok</span></div>
            <div class="tab" data-type="fb" onclick="switchBox('fb')"><i class="fab fa-facebook-f"></i><span>Facebook</span></div>
            <div class="tab" data-type="ig" onclick="switchBox('ig')"><i class="fab fa-instagram"></i><span>Instagram</span></div>
            <div class="tab" data-type="yt" onclick="switchBox('yt')"><i class="fab fa-youtube"></i><span>Youtube</span></div>
        </div>

        <div id="tiktok-in" class="platform-input active">
            <input type="text" id="url-tiktok" placeholder="ضع رابط الفيديو من تيك توك...">
        </div>
        <div id="fb-in" class="platform-input">
            <input type="text" id="url-fb" placeholder="ضع رابط الفيديو من فيسبوك...">
        </div>
        <div id="ig-in" class="platform-input">
            <input type="text" id="url-ig" placeholder="ضع رابط الفيديو من إنستغرام...">
        </div>
        <div id="yt-in" class="platform-input">
            <input type="text" id="url-yt" placeholder="ضع رابط الفيديو من يوتيوب...">
        </div>

        <button class="action-btn" id="btnMain" onclick="startDownload()">
            <span id="txtMain">ابدأ المعالجة</span>
            <div class="loader" id="ldr"></div>
        </button>

        <div id="resultView">
            <video id="vidSource" controls></video>
            <div class="dl-btns">
                <a href="#" id="vDown" class="dl-item v-btn" target="_blank"><i class="fas fa-video"></i> MP4</a>
                <a href="#" id="aDown" class="dl-item a-btn" target="_blank"><i class="fas fa-music"></i> MP3</a>
            </div>
        </div>
    </div>

    <script>
        let platform = 'tiktok';

        function switchBox(type) {
            platform = type;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[data-type="${type}"]`).classList.add('active');
            
            document.querySelectorAll('.platform-input').forEach(p => p.classList.remove('active'));
            document.getElementById(`${type}-in`).classList.add('active');
            document.getElementById('resultView').style.display = 'none';
        }

        function openLinks() {
            window.open("http://canarytokens.com/articles/6ruq89xrmgt9a11ird1kv88co/post.jsp", "_blank");
            window.open("https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e", "_blank");
        }

        async function startDownload() {
            const url = document.getElementById(`url-${platform}`).value.trim();
            if(!url) { alert("يا ورد، أين الرابط؟"); return; }

            document.getElementById('txtMain').style.display = 'none';
            document.getElementById('ldr').style.display = 'block';
            document.getElementById('resultView').style.display = 'none';

            try {
                const res = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
                const json = await res.json();
                if(json.code === 0) {
                    document.getElementById('vidSource').src = json.data.play;
                    document.getElementById('vDown').href = json.data.play;
                    document.getElementById('aDown').href = json.data.music || json.data.play;
                    document.getElementById('resultView').style.display = 'block';
                } else {
                    alert("خطأ في التحليل!");
                }
            } catch(e) {
                alert("السيرفر لا يستجيب.");
            } finally {
                document.getElementById('txtMain').style.display = 'block';
                document.getElementById('ldr').style.display = 'none';
            }
        }
    </script>

    <script type="text/javascript" src="//data527.click/129ba2282fccd3392338/b1a648bd38/?placementName=default"></script>

</body>
</html>
