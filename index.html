<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AETHER SENTINEL | PREMIUM V1.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root { --p-green: #1DB954; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; overflow: hidden; margin: 0; }
        .track-card:active { transform: scale(0.98); background: rgba(255,255,255,0.1); }
        .dynamic-bg { position: fixed; inset: 0; background: radial-gradient(circle at top, #1db95422 0%, transparent 70%); z-index: -1; transition: 1s; }
        .scroll-area { height: calc(100vh - 180px); overflow-y: auto; scrollbar-width: none; }
        .seekbar-fill { height: 100%; background: var(--p-green); box-shadow: 0 0 10px var(--p-green); width: 0%; transition: 0.1s; }
    </style>
</head>
<body>

    <div class="dynamic-bg" id="bg-glow"></div>

    <header class="p-6 pb-2">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-2">
                <i class="fas fa-shield-halved text-[#1DB954] text-xl"></i>
                <h1 class="font-black text-lg tracking-tighter">AETHER SENTINEL</h1>
                <span class="text-[8px] bg-[#1DB954] text-black px-1 rounded font-bold">PREMIUM</span>
            </div>
            <i class="fas fa-gear opacity-40"></i>
        </div>
        <div class="flex items-end gap-4 mb-4">
            <img id="main-art" src="https://via.placeholder.com/150/000/1DB954?text=SENTINEL" class="w-32 h-32 rounded-lg shadow-2xl shadow-[#1db95422]">
            <div>
                <p class="text-[10px] font-bold text-[#1DB954] uppercase tracking-widest">Playlist</p>
                <h2 class="text-3xl font-black">Mega Hit Mix</h2>
            </div>
        </div>
    </header>

    <main class="scroll-area px-4" id="track-container">
        <p class="text-center opacity-20 mt-10 animate-pulse text-xs">جاري سحب البيانات من المصفوفة...</p>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-xl border-t border-white/5 p-4 pb-8 z-50">
        <div class="w-full h-1 bg-white/10 rounded-full mb-4 overflow-hidden">
            <div id="seek-fill" class="seekbar-fill"></div>
        </div>
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3 w-1/3">
                <img id="play-art" src="https://via.placeholder.com/50" class="w-12 h-12 rounded-md object-cover">
                <div class="overflow-hidden">
                    <p id="play-title" class="text-xs font-bold truncate">اختر أغنية</p>
                    <p id="play-artist" class="text-[10px] opacity-40">Aether Station</p>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <i class="fas fa-backward-step text-xl" onclick="prevTrack()"></i>
                <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center text-black" onclick="togglePlay()">
                    <i id="play-icon" class="fas fa-play text-xl ml-1"></i>
                </div>
                <i class="fas fa-forward-step text-xl" onclick="nextTrack()"></i>
            </div>
            <div class="flex justify-end w-1/3 gap-4 opacity-40">
                <i class="fas fa-plus-square text-xl" onclick="openUpload()"></i>
                <i class="fas fa-satellite-dish text-xl"></i>
            </div>
        </div>
    </div>

    <audio id="main-audio"></audio>

    <script>
        // 1. Firebase Setup
        const firebaseConfig = { databaseURL: "https://gorm-b3316-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. Global Variables
        let tracks = [];
        let currentIndex = -1;
        const audio = document.getElementById('main-audio');
        const playIcon = document.getElementById('play-icon');
        const seekFill = document.getElementById('seek-fill');

        // 3. Load Data
        db.ref('sentinel_content').on('value', snap => {
            const data = snap.val();
            const container = document.getElementById('track-container');
            if(!data) {
                container.innerHTML = `<div class="p-10 text-center opacity-30 text-xs">المصفوفة فارغة.. ارفع أول أغنية الآن</div>`;
                return;
            }
            tracks = Object.keys(data).map(id => ({id, ...data[id]}));
            container.innerHTML = '';
            tracks.reverse().forEach((track, index) => {
                container.innerHTML += `
                    <div class="track-card flex items-center gap-4 p-3 rounded-xl transition-all mb-1" onclick="playTrack(${tracks.length - 1 - index})">
                        <i class="fas fa-ellipsis-v opacity-20 ml-2"></i>
                        <div class="flex-1 text-right">
                            <p class="text-sm font-bold truncate">${track.id.substring(0,10)}</p>
                            <p class="text-[9px] opacity-40 uppercase">Sentinel Node</p>
                        </div>
                        <img src="${track.url.replace('.mp4', '.jpg')}" class="w-12 h-12 rounded object-cover bg-black" onerror="this.src='https://via.placeholder.com/50/000/1DB954?text=♫'">
                    </div>
                `;
            });
        });

        // 4. Player Functions
        function playTrack(index) {
            currentIndex = index;
            const track = tracks[currentIndex];
            audio.src = track.url;
            document.getElementById('play-title').innerText = "Streaming: " + track.id.substring(0,5);
            document.getElementById('play-art').src = track.url.replace('.mp4', '.jpg');
            document.getElementById('main-art').src = track.url.replace('.mp4', '.jpg');
            
            audio.play();
            playIcon.className = "fas fa-pause text-xl";
            
            // Dynamic Background
            document.getElementById('bg-glow').style.background = `radial-gradient(circle at top, ${getRandomColor()}44 0%, transparent 70%)`;
        }

        function togglePlay() {
            if(currentIndex === -1 && tracks.length > 0) { playTrack(0); return; }
            if(audio.paused) { audio.play(); playIcon.className = "fas fa-pause text-xl"; }
            else { audio.pause(); playIcon.className = "fas fa-play text-xl ml-1"; }
        }

        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            seekFill.style.width = pct + "%";
        };

        function nextTrack() { if(currentIndex < tracks.length -1) playTrack(currentIndex + 1); }
        function prevTrack() { if(currentIndex > 0) playTrack(currentIndex - 1); }

        // 5. Cloudinary Upload
        const myWidget = cloudinary.createUploadWidget({ 
            cloudName: "dlgwjrf8b", uploadPreset: "LZPI_5", sources: ['local']
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('sentinel_content/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
            }
        });
        function openUpload() { myWidget.open(); }

        function getRandomColor() {
            const colors = ['#1DB954', '#ff00ff', '#00ccff', '#ffcc00'];
            return colors[Math.floor(Math.random()*colors.length)];
        }
    </script>
</body>
</html>
